<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="version" content="1777238555">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora — Committees</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    header h1 span { color: #7c6af7; }
    header nav { display: flex; gap: 16px; font-size: 0.85rem; }
    header nav a { color: #7c6af7; text-decoration: none; }
    #auth-bar { display: flex; gap: 8px; align-items: center; }
    #auth-bar input { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px; border-radius: 5px; font-size: 0.82rem; width: 220px; }
    #auth-bar button { background: #7c6af7; color: #fff; border: none; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 0.82rem; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .board-bar { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 0.82rem; color: #4caf50; }
    .committee-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .committee-name { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .committee-domain { font-size: 0.72rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .committee-desc { font-size: 0.84rem; color: #aaa; margin-bottom: 12px; }
    .member-chip { display: inline-block; background: #2a2a2a; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; color: #888; margin: 2px; }
    .member-chip.head { background: #13102a; color: #7c6af7; border: 1px solid #2a1a5a; }
    .charter-text { font-size: 0.8rem; color: #666; border-left: 2px solid #2a2a2a; padding-left: 12px; margin-top: 10px; line-height: 1.5; }
    .action-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 6px 0; border-bottom: 1px solid #1e1e1e; }
    .status-badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; font-weight: 600; }
    .status-pending { background: #2a2a1a; color: #f5a623; }
    .status-approved { background: #0f2a0f; color: #4caf50; }
    .status-rejected { background: #2a0f0f; color: #f66; }
    .propose-btn { background: #7c6af7; color: #fff; border: none; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-top: 10px; }
  </style>

  <style>
    .site-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 0; }
    .site-tab { padding: 8px 20px; font-size: 0.85rem; color: #666; text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .site-tab:hover { color: #aaa; }
    .site-tab.active { color: #7c6af7; border-bottom-color: #7c6af7; font-weight: 600; }
    .site-tab .tab-icon { font-size: 1rem; }
    @media (max-width: 600px) {
      .site-tabs { position: fixed; bottom: 0; top: auto; left: 0; right: 0; background: #111; border-top: 1px solid #222; border-bottom: none; display: flex; justify-content: space-around; padding: 8px 0 12px; margin: 0; z-index: 100; }
      .site-tab { flex: 1; text-align: center; font-size: 0.62rem; padding: 4px 2px 2px; flex-direction: column; align-items: center; gap: 1px; border-bottom: none !important; margin-bottom: 0 !important; }
      .site-tab .tab-icon { font-size: 1.1rem; display: block; }
      main { padding-bottom: 75px; }
    }
    .status-bar-mini { background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:10px 18px; margin-bottom:16px; display:flex; gap:20px; font-size:0.82rem; color:#aaa; flex-wrap:wrap; }
    .status-bar-mini strong { color:#e0e0e0; }
  </style>
</head>
<body>
<header>
  <h1>&#x2B21; <span>Agora</span> Committees</h1>
    
  <div id="auth-bar">
    <input type="text" id="key-input" placeholder="API key (agora_...)">
    <button onclick="connect()">Connect</button>
    <span id="user-chip"></span>
  </div>
</header>
  <div class="status-bar-mini">
    <span>Users: <strong id="s-users">—</strong></span>
    <span>Assets: <strong id="s-assets">—</strong></span>
    <span><strong id="s-rate" style="color:#4caf50">—</strong>/A</span>
  </div>
  <script>
  fetch('/status').then(function(r){return r.json();}).then(function(s){
    var u=document.getElementById('s-users'); if(u) u.textContent=s.users;
    var a=document.getElementById('s-assets'); if(a) a.textContent=s.assets;
    var r=document.getElementById('s-rate'); if(r && s.usd_per_token) r.textContent='$'+Number(s.usd_per_token).toFixed(2);
  }).catch(function(){});
  </script>
  <div class="site-tabs">
    <a href="/ui#assets" class="site-tab"><span class="tab-icon">📋</span><span>Feed</span></a>
    <a href="/ui#profile" class="site-tab"><span class="tab-icon">👤</span><span>Profile</span></a>
    <a href="/ui#messages" class="site-tab"><span class="tab-icon">✉️</span><span>Messages</span></a>
    <a href="/ui#users" class="site-tab"><span class="tab-icon">🔍</span><span>Members</span></a>
    <a href="/ui#more" class="site-tab active"><span class="tab-icon">⋯</span><span>More</span></a>
  </div>

<main>
  <div id="board-bar" class="board-bar">Loading board info...</div>
  <div id="committee-list"><div style="color:#444;padding:32px;text-align:center">Loading committees...</div></div>
</main>
<script>
var KEY = localStorage.getItem('agora_key') || '';
var ME = null;
var BOARD = [];

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function connect() {
  KEY = document.getElementById('key-input').value.trim();
  localStorage.setItem('agora_key', KEY);
  boot();
}

async function api(path, method, body) {
  var opts = { method: method||'GET', headers: {'X-API-Key': KEY, 'Content-Type': 'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(path, opts);
  var d = await r.json();
  if (!r.ok) throw new Error(d.detail || JSON.stringify(d));
  return d;
}

async function boot() {
  if (KEY) {
    document.getElementById('key-input').value = KEY;
    try {
      ME = await api('/users/me');
      document.getElementById('user-chip').innerHTML = '<strong style="color:#7c6af7">@' + esc(ME.handle) + '</strong> · ' + ME.total_score.toFixed(1) + ' pts';
    } catch(e) {}
  }
  loadCommittees();
}

async function loadCommittees() {
  try {
    var d = await fetch('/committees/list').then(r => r.json());
    BOARD = d.board || [];
    var isBoard = ME && BOARD.includes(ME.handle);

    document.getElementById('board-bar').innerHTML =
      '🏛 Board of Directors: ' + BOARD.map(function(h){ return '<strong>@' + esc(h) + '</strong>'; }).join(' · ') +
      (isBoard ? ' <span style="background:#1a4a1a;color:#4caf50;padding:2px 8px;border-radius:3px;font-size:0.75rem;margin-left:8px;">You are on the Board</span>' : '');

    var html = '';
    (d.committees||[]).forEach(function(c) {
      var isHead = ME && c.members.some(function(m){ return m.handle === ME.handle && m.role === 'head'; });
      var isMember = ME && c.members.some(function(m){ return m.handle === ME.handle; });

      html += '<div class="committee-card">';
      html += '<div class="committee-name">' + esc(c.name) + '</div>';
      html += '<div class="committee-domain">' + esc(c.domain||'') + '</div>';
      html += '<div class="committee-desc">' + esc(c.description||'') + '</div>';
      html += '<div style="margin-bottom:8px;">';
      c.members.forEach(function(m) {
        var actStr = ' · ' + (m.actions_since_review||0) + '/' + (m.review_threshold||10) + ' actions';
        html += '<span class="member-chip ' + (m.role==='head'?'head':'') + '">@' + esc(m.handle) + (m.role==='head'?' (head)':'') + actStr + '</span>';
      });
      html += '</div>';
      html += '<details><summary style="cursor:pointer;color:#555;font-size:0.8rem;">Charter ▾</summary>';
      html += '<div class="charter-text">' + esc(c.charter||'No charter set.') + '</div></details>';

      if (isBoard || isMember) {
        html += '<div style="margin-top:12px;border-top:1px solid #222;padding-top:12px;">';
        html += '<button class="propose-btn" onclick="openPropose(\'' + esc(c.slug) + '\')">+ Propose Action</button>';
        if (isBoard || isHead) {
          html += ' <button onclick="openAddMember(\'' + esc(c.slug) + '\')" style="background:#2a2a2a;color:#888;border:1px solid #333;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:0.8rem;margin-left:6px;">+ Propose Member</button>';
        }
        html += '</div>';
      }
      html += '</div>';
    });

    document.getElementById('committee-list').innerHTML = html || '<div style="color:#444;padding:32px;text-align:center">No committees found.</div>';

    // Add "Propose New Committee" button for board members
    if (isBoard) {
      var newCommBtn = '<div style="text-align:right;margin-bottom:16px;">' +
        '<button onclick="openProposeNewCommittee()" style="background:#4caf50;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:0.82rem;">+ Propose New Committee</button>' +
        '</div>';
      document.getElementById('committee-list').insertAdjacentHTML('beforebegin', newCommBtn);
    }
  } catch(e) {
    document.getElementById('committee-list').innerHTML = '<div style="color:#f66;padding:24px">Error: ' + esc(e.message) + '</div>';
  }
}

function openPropose(slug) {
  var content = prompt('Proposal title:');
  if (!content) return;
  var desc = prompt('Description (optional):');
  api('/committees/' + slug + '/propose', 'POST', {title: content, description: desc||null, action_type: 'proposal'})
    .then(function(d) { alert('Proposed! Action #' + d.action_id + ' awaiting board vote (' + d.board_required + ' votes needed)'); loadCommittees(); })
    .catch(function(e) { alert('Error: ' + e.message); });
}

function openAddMember(slug) {
  var handle = prompt('Handle to propose as member:');
  if (!handle) return;
  var role = prompt('Role (member or head):', 'member');
  if (!role) role = 'member';
  // Note: this goes to board vote, not direct add
  fetch('/committees/' + slug + '/propose-member', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': KEY},
    body: JSON.stringify({handle: handle, role: role, term_days: 100})
  }).then(function(r){ return r.json(); }).then(function(d) {
    if (d.ok) alert('Proposed! ' + d.message);
    else alert('Error: ' + (d.detail || JSON.stringify(d)));
    loadCommittees();
  }).catch(function(e){ alert('Error: ' + e.message); });
}

function openProposeNewCommittee() {
  var name = prompt('Committee name:'); if (!name) return;
  var slug = prompt('Slug (lowercase, no spaces):'); if (!slug) return;
  var description = prompt('Description:'); if (!description) return;
  var domain = prompt('Domain (comma-separated keywords):'); if (!domain) return;
  var charter = prompt('Charter (what can this committee do?):'); if (!charter) return;
  var head = prompt('Initial head handle (optional):') || null;
  fetch('/committees/propose-new', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': KEY},
    body: JSON.stringify({name: name, slug: slug, description: description, domain: domain, charter: charter, initial_head: head})
  }).then(function(r){ return r.json(); }).then(function(d) {
    if (d.ok) alert('Proposed! ' + d.message);
    else alert('Error: ' + (d.detail || JSON.stringify(d)));
  }).catch(function(e){ alert('Error: ' + e.message); });
}

if (KEY) { document.getElementById('key-input').value = KEY; boot(); } else boot();
</script>
<script>
(function() {
  // Self-versioning: append ?v=HASH to all internal page links so cache always busts
  var VERSION_KEY = 'agora_version';
  fetch('/federation/version', {cache: 'no-store'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var serverHash = (d.codebase_hash || '').slice(0,8);
      var localHash = localStorage.getItem(VERSION_KEY) || '';
      if (serverHash && localHash && serverHash !== localHash) {
        localStorage.setItem(VERSION_KEY, serverHash);
        // Hard reload with version in URL
        var url = new URL(window.location.href);
        url.searchParams.set('v', serverHash);
        window.location.replace(url.toString());
      } else if (serverHash) {
        localStorage.setItem(VERSION_KEY, serverHash);
      }
    }).catch(function(){});
})();
</script>
</body>
</html>
